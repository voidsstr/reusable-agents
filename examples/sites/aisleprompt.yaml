# AislePrompt site config (recommend mode — agent emails recs, doesn't auto-ship).
#
# Used by: voidsstr@nsc-assistant. The implementer + deployer blocks are kept
# here as inert documentation — flip site.mode to 'implement' to activate them.
site:
  id: aisleprompt
  domain: aisleprompt.com
  label: AislePrompt
  mode: recommend                  # email recs only; user replies to mark which to ship

data_sources:
  gsc:
    site_url: sc-domain:aisleprompt.com
    default_country_filter: usa
  ga4:
    property_id: "529023310"
  db:
    type: docker-exec
    container: mr-aisleprompt-recipe-scraper-1
    queries_file: ./db-queries/aisleprompt.js   # node script that emits stats JSON to stdout

revenue_kpis:
  - id: instacart-carts
    label: Instacart cart creates
    ga4_event: instacart_cart_create
    db_table: instacart_clicks
  - id: amazon-clicks
    label: Amazon /k/ click-throughs
    ga4_event: ""                  # no GA4 event; DB-only
    db_table: kitchen_click_events
  - id: sign-ups
    label: Sign-ups completed
    ga4_event: sign_up_complete
    db_table: ""

analyzer:
  primary_objective: top5-rank
  max_recs_per_run: 12
  us_traffic_weight: 1.5
  min_impressions_for_target: 3

# Implementer/deployer blocks — present so flipping mode to 'implement'
# wires up the AislePrompt deploy pipeline immediately. In recommend mode
# these are unused.
implementer:
  repo_path: /home/voidsstr/development/nsc-assistant/Customer Applications/aisleprompt/v1.0
  branch: master
  commit_message_template: "SEO agent: %s"

deployer:
  test:
    cwd: tests
    cmd: TEST_URL=http://localhost:4001 npx playwright test --config=pw.config.ts --reporter=line
  build:
    cwd: .
    cmd: docker build -f Dockerfile.azure -t {image}:{tag} .
  push:
    cmd: az acr login --name nscappsacr && docker push {image}:{tag}
  deploy:
    cmd: az containerapp update --name {app} --resource-group {rg} --image {image}:{tag}
    vars:
      app: aisleprompt
      rg: nsc-apps
      image: nscappsacr.azurecr.io/aisleprompt
  smoke_check:
    base_url: https://aisleprompt.com
    paths:
      - /
      - /sitemap.xml
      - /sitemap-collections.xml
      - /recipes
      - /meal-plan
      - /shoppinglist
    timeout_seconds: 30

reporter:
  email:
    to: [mperry@northernsoftwareconsulting.com]
    from: SEO Agent <automation@northernsoftwareconsulting.com>
    subject_template: "[SEO:{site}] run {tag} — {recs_count} recs"
    # Microsoft Graph sendMail — recommended path for M365.
    # Doesn't need SMTP AUTH enabled at the tenant. Same refresh token the
    # responder uses for IMAP; mint-token.py asks Microsoft for a Graph-scoped
    # token via cross-resource refresh.
    graph:
      oauth_file: ~/.reusable-agents/responder/.oauth.json
      scope: "offline_access https://graph.microsoft.com/Mail.Send https://graph.microsoft.com/Mail.Send.Shared"
      use_shared_mailbox: true
      from_address: automation@northernsoftwareconsulting.com
    # SMTP fallback (only used if 'graph' block above is removed). Not active
    # by default because M365 disables tenant-wide SMTP AUTH out of the box.
    # smtp:
    #   host: smtp.office365.com
    #   port: 587
    #   auth_method: oauth2
    #   username: automation@northernsoftwareconsulting.com
    #   oauth_file: ~/.reusable-agents/responder/.oauth.json
  dashboard:
    base_url: http://localhost:8080
    agent_id: seo-opportunity-agent

auth:
  oauth_file: ~/.openclaw/workspace/tools/seo/.oauth.json   # reuse existing token

runs_root: ~/.openclaw/workspace/tools/seo/runs              # reuse existing runs dir for continuity
