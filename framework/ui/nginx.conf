# Serves the React SPA + reverse-proxies /api and /ws to the API service.
# Single-origin makes the UI iframe-safe regardless of where it's embedded.

upstream agent_api {
    server agent-api:8090;
}

server {
    listen 80;
    server_name _;

    # ── API REST ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://agent_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # ── WebSockets ────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://agent_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ── React SPA (everything else) ───────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Iframe-friendly: allow embedding from anywhere by default. Tighten
    # via environment + envsubst if needed for production.
    add_header X-Frame-Options "ALLOWALL" always;
}
